<!DOCTYPE html>
<html lang="zh">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Character </title>

<style>

:root{

    --theme:#1598dc;

    --bg:#f3f5f7;

    --card:#ffffff;

}

*{
    box-sizing:border-box;
}

body{

    margin:0;

    background:var(--bg);

    font-family:
    "Segoe UI",
    sans-serif;

}

.container{

    max-width:1400px;

    margin:auto;

    padding:24px;

}

.header{

    border-bottom:
    4px solid var(--theme);

    margin-bottom:24px;

    padding-bottom:12px;

}

.title{

    font-size:42px;

    font-weight:bold;

}

.subtitle{

    color:#666;

    margin-top:4px;

}

.layout{

    display:grid;

    grid-template-columns:
    1fr 320px;

    gap:24px;

}

.main{

    min-width:0;

}

.sidebar{

    position:sticky;

    top:20px;

    height:max-content;

}

.card{

    background:var(--card);

    border-left:
    6px solid var(--theme);

    border-radius:10px;

    margin-bottom:18px;

    padding:16px;

    box-shadow:
    0 2px 10px rgba(0,0,0,.08);

}

.card h3{

    margin-top:0;

}

.avatar{

    width:100%;

    border-radius:8px;

}

.section{

    background:white;

    padding:20px;

    margin-bottom:18px;

    border-radius:10px;

    box-shadow:
    0 2px 10px rgba(0,0,0,.08);

}

.section h2{

    margin-top:0;

    color:var(--theme);

}

/* =====================
   Stats
===================== */

.stat{

    margin-bottom:18px;

}

.stat-header{

    display:flex;

    justify-content:space-between;

    margin-bottom:6px;

}

.segment-container{

    display:flex;

    flex-wrap:wrap;

    gap:4px;

    margin-top:6px;

}

.segment{

    width:90px;

    height:10px;

    border-radius:999px;

    background:#dddddd;

    overflow:hidden;

}

.segment-fill{

    height:100%;

    background:var(--theme);

}

.multiplier{

    margin-top:4px;

    font-size:12px;

    color:#666;

}

/* =====================
   Timeline Tags
===================== */

.tag{

    display:inline-block;

    padding:5px 10px;

    margin:4px;

    border-radius:999px;

    background:var(--theme);

    color:white;

    font-size:13px;

}

/* =====================
   Related
===================== */

.related-link{

    display:block;

    padding:8px;

    margin-bottom:6px;

    border-radius:6px;

    text-decoration:none;

    color:#333;

}

.related-link:hover{

    background:#f0f0f0;

}

</style>

</head>
<body>

<div class="container">

    <div class="header">

        <div id="name" class="title"></div>

        <div id="subtitle" class="subtitle"></div>

    </div>

    <div class="layout">

        <main class="main">

            <div id="sections"></div>

        </main>

        <aside class="sidebar">

            <div class="card">

                <img
                id="avatar"
                class="avatar">

            </div>

            <div class="card">

                <h3>Entity Data</h3>

                <div id="stats"></div>

            </div>

            <div class="card">

                <h3>Status</h3>

                <b id="status"></b>

                <p id="statusDesc"></p>

            </div>

            <div class="card">

                <h3>Timeline</h3>

                <div id="timelines"></div>

            </div>

            <div class="card">

                <h3>Related</h3>

                <div id="related"></div>

            </div>

        </aside>

    </div>

</div>

<script>

const params =
new URLSearchParams(
    location.search
);

const characterId =
params.get("character");

if(!characterId){

    document.body.innerHTML =
    "<h1>Character Not Found</h1>";

}else{

    Promise.all([

    fetch(
        "data/player_reference.json"
    ).then(r=>r.json()),

    fetch(
        `data/characters/${characterId}.json`
    ).then(r=>r.json())

])
.then(([base,data])=>{

    renderCharacter(
        data,
        base
    );

})
.catch(err=>{

    console.error(err);
});

}

function renderCharacter(data,base){

    document.documentElement.style
    .setProperty(
        "--theme",
        data.themeColor
    );

    document.title =
    data.name;

    name.textContent =
    data.name;

    subtitle.textContent =
    data.subtitle || "";

    avatar.src =
    data.image;

    status.textContent =
    data.status;

    statusDesc.textContent =
    data.statusDescription;

    renderStats(data.stats,base);

    renderTimelines(
        data.timelines
    );

    renderRelated(
        data.related
    );

    renderSections(
        data.sections
    );

}

/* =====================
   Stats
===================== */

function renderStats(
    statsData,
    baseData
){

    let html="";

    statsData.forEach(stat=>{

        let displayValue="";
        let ratio=1;

        if(stat.type==="value"){

            ratio =
            stat.value /
            (
                baseData[
                    stat.name
                ] || 1
            );

            displayValue =
            stat.value;

        }

        else if(stat.type==="level"){

            ratio =
            stat.value /
            (
                baseData[
                    stat.name
                ] || 1
            );

            displayValue =
            "Lv."+stat.value;

        }

        else if(stat.type==="percent"){

            ratio =
            stat.value / 100;

            displayValue =
            stat.value + "%";

        }

        else{

            ratio = 1;

            displayValue =
            stat.value;

        }

        const fullSegments =
        Math.floor(ratio);

        const partial =
        ratio - fullSegments;

        let segmentsHtml="";

        for(
            let i=0;
            i<fullSegments;
            i++
        ){

            segmentsHtml +=
            `
            <div class="segment">

                <div
                class="segment-fill"
                style="width:100%">
                </div>

            </div>
            `;

        }

        if(partial>0){

            segmentsHtml +=
            `
            <div class="segment">

                <div
                class="segment-fill"
                style="
                width:${partial*100}%
                ">
                </div>

            </div>
            `;
        }

        html +=
        `
        <div class="stat">

            <div class="stat-header">

                <span>
                ${stat.label}
                </span>

                <span>
                ${displayValue}
                </span>

            </div>

            <div
            class="segment-container">

                ${segmentsHtml}

            </div>

            <div
            class="multiplier">

                ×${ratio.toFixed(2)}

            </div>

        </div>
        `;
    });

    document
    .getElementById(
        "stats"
    )
    .innerHTML =
    html;

}

/* =====================
   Timelines
===================== */

function renderTimelines(arr){

    let html="";

    arr.forEach(item=>{

        html +=
        `<span class="tag">
        ${item}
        </span>`;

    });

    timelines.innerHTML =
    html;

}

/* =====================
   Related
===================== */

function renderRelated(arr){

    let html="";

    arr.forEach(item=>{

        html +=
        `
        <a
        class="related-link"

        href=
        "character.html?character=${item.id}">

        ${item.name}

        </a>
        `;
    });

    related.innerHTML =
    html;

}

/* =====================
   Sections
===================== */

function renderSections(arr){

    let html="";

    arr.forEach(section=>{

        html +=
        `
        <div class="section">

            <h2>
            ${section.title}
            </h2>

            <p>
            ${section.content}
            </p>

        </div>
        `;
    });

    sections.innerHTML =
    html;

}

</script>

</body>
</html>
